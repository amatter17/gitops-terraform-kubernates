name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  lint-test-sast:
    name: Lint, Test & SAST
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Unit tests (Karma + ChromeHeadless)
        run: npm test -- --code-coverage

      - name: Upload Karma coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karma-coverage
          path: frontend/coverage/

      - name: SonarQube SAST
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: frontend
          args: -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint-test-sast
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t inventory-frontend:${{ github.sha }} ./frontend

      - name: Trivy scan — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: inventory-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan — SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: inventory-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
